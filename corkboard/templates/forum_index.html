{% extends "base.html" %}
{% block title %}Forums{% endblock %}
{% block content %}
<div class="breadcrumb" >
    <span style="color:var(--cb-muted)">All Forums</span>
</div>
<div class="forum-list">
    {% for forum in forums %}
    <a href="{{ prefix }}/f/{{ forum.slug }}" class="forum-card">
        <h2>{{ forum.name }}</h2>
    </a>
    {% endfor %}
</div>

{% if not forums %}
<p class="empty">No forums configured for this app.</p>
{% endif %}
{% endblock %}
