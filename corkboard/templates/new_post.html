{% extends "base.html" %}
{% block title %}New Post{% endblock %}
{% block content %}
<h1>New {{ "Bug / Feature Request" if board == "structured" else "Discussion Post" }}</h1>

<form method="POST" action="{{ prefix }}/new" class="post-form">
  <input type="hidden" name="board" value="{{ board }}">

  <label for="category">Category</label>
  <select name="category" id="category" required>
    {% for cat in categories %}
      <option value="{{ cat }}">{{ cat }}</option>
    {% endfor %}
  </select>

  <label for="title">Title</label>
  <input type="text" name="title" id="title" required maxlength="500"
         placeholder="{{ 'Brief description of the issue' if board == 'structured' else 'Topic' }}">

  <label for="body">Details (Markdown supported)</label>
  <textarea name="body" id="body" rows="10" required
            placeholder="{{ 'Steps to reproduce, expected vs actual behaviour...' if board == 'structured' else 'Share your thoughts...' }}"></textarea>

  <div class="form-actions">
    <button type="submit" class="btn btn-primary">Submit</button>
    <a href="{{ prefix }}/?board={{ board }}" class="btn btn-secondary">Cancel</a>
  </div>
</form>
{% endblock %}
