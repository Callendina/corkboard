# Corkboard config fragment for My App
# Deploy to config.d/myapp.yaml

app_slug: "myapp"
domains:
  - "myapp.example.com"
app_name: "My App"
# dev_api_key was removed in 2026-05. Programmatic access to
# /corkboard/api/dev/* now uses gatekeeper-issued API keys — Caddy's
# forward_auth resolves the key and corkboard reads the resulting
# X-Gatekeeper-Role header. See corkboard CLAUDE.md "Authentication"
# for how to wire a new app for HTTPS-direct dev API posting.
theme_file: "/path/to/corkboard-theme.json"

forums:
  - slug: "bugs"
    name: "Bug Reports"
    type: "lifecycle"
    post_types: ["bug"]
    read_roles: ["anon", "user", "admin"]
    post_roles: ["user", "admin"]

  - slug: "features"
    name: "Feature Requests"
    type: "lifecycle"
    post_types: ["feature"]
    read_roles: ["anon", "user", "admin"]
    post_roles: ["user", "admin"]

  - slug: "roadmap"
    name: "Development Roadmap"
    type: "lifecycle"
    post_types: ["todo", "bug", "feature"]
    read_roles: ["anon", "user", "admin"]
    post_roles: ["admin"]

  - slug: "general"
    name: "Discussion"
    type: "general"
    post_types: ["general"]
    read_roles: ["user", "admin"]
    post_roles: ["user", "admin"]

webhooks: []
rate_limits:
  posts_per_hour: 5
  comments_per_hour: 20
